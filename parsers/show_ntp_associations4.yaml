vars:
  ntp:
    key: "{{ item.ip }}"
    values: 
      id: "{{ item.ip }}"
      name: "{{ item.authentication }}"
      master: "{{ item.master }}"
      sanity: "{{ item.sanity }}"
      validation: "{{ item.valid }}"
      stratum: "{{ item.stratum }}"
    

keys:
  ntps:
    value: "{{ ntp }}"
    items: "^(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+).+(?P<authentication>authenticated).\\s+(?P<master>our_master).\\s+(?P<sanity>sane|insane).\\s+(?P<valid>valid|invalid).\\s+\\D+\\s(?P<stratum>\\d+)?"

#"^(\\d+\\.\\d+\\.\\d+\\.\\d+).+(authenticated).\\s+(our_master).\\s+(sane|insane).\\s+(valid|invalid).\\s+\\D+\\s(\\d+)"


