---
- name: ADD STATIC INTERFACE BINDING TO EPG
  hosts: vlc
  connection: local
  gather_facts: no

  ### MODIFY vars WITH YOUR REQUIRED VALUES  ####
  vars:
    EPGS:
       - { Tenant_name: UNGSC_VLC_DC, AppProfile_name: DC_VLC_PRO_AP, vlanID: 149, mode: access, EPG_name: DC_PRO_v149_10_129_22_224_27_EPG, static_binding: "{{ Bindings }}"}
      #  - { Tenant_name: UNGSC_VLC_DC, AppProfile_name: DC_VLC_PRO_AP, vlanID: 148, mode: access, EPG_name: DC_PRO_v148_10_129_22_192_27_EPG, static_binding: "{{ Bindings }}"}
    #extpaths = fex ID, modify accordingly
    Bindings:
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/2 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/2 }          
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/4 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/4 }   
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/6 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/6 }   
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/8 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/8 }     
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/10 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/10 }
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/12 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/12 }   
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/1 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/1 }          
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/3 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/3 }   
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/5 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/5 }   
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/7 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/7 }     
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/9 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/9 }
      # - { Switch_ID: 103, interface_type: fex, extpaths: 101, port: 1/11 }
      # - { Switch_ID: 104, interface_type: fex, extpaths: 102, port: 1/11 }               
  tasks:

    - name: Add Static Path binding for given EPG
      aci_static_binding_to_epg:
        host: "{{ ansible_host }}"
        username: "{{ username }}"
        password: "{{ password }}"
        validate_certs: no
        tenant: "{{ item.0.Tenant_name }}"
        ap: "{{ item.0.AppProfile_name }}"
        epg: "{{ item.0.EPG_name }}"
        encap_id: "{{ item.0.vlanID }}"
        interface_mode: "{{ item.0.mode }}"
        interface_type: "{{ item.1.interface_type }}"
        extpaths: "{{ item.1.extpaths }}"
        pod: 1
        leafs: "{{ item.1.Switch_ID }}"
        interface: '{{ item.1.port}}'
        state: present
      loop: "{{ EPGS|subelements('static_binding') }}"  
      loop_control:
        pause: "{{ loop_control_pause | default(0) }}"      
      delegate_to: localhost

