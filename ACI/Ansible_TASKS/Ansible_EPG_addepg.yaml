  tasks:
    - name: Add EPG
      cisco.aci.aci_epg:
        host: "{{ ansible_host }}"
        username: "{{ username }}"
        password: "{{ password }}"
        validate_certs: no
        tenant: "{{ item.Tenant_name }}"
        ap: "{{ item.AppProfile_name }}"
        epg: "{{ item.EPG_name }}"
        bd: "{{ item.BD_name }}"
        state: present
      loop: "{{ EPGs }}"  
      loop_control:
        pause: "{{ loop_control_pause | default(0) }}"      
      delegate_to: localhost

    - name: Add domain to EPG binding
      cisco.aci.aci_epg_to_domain:
        host: "{{ ansible_host }}"
        username: "{{ username }}"
        password: "{{ password }}"
        validate_certs: no        
        tenant: "{{ item.Tenant_name }}"
        ap: "{{ item.AppProfile_name }}"
        epg: "{{ item.EPG_name }}"
        domain: "{{ item.domain_name }}"
        domain_type: "{{ item.domain_type }}"
        state: present
      loop: "{{ EPGs }}"  
      loop_control:
        pause: "{{ loop_control_pause | default(0) }}"      
      delegate_to: localhost     
