AAEP_task_config:
  - name: DCnetworks_AAEP
    domains:
      - domain_type: fc
        domain_name: SAN_FibreChannelDomain
      - domain_type: phys
        domain_name: FCoE_FIP_Vlan_PhysDom

Interface_Policy_Group_task_config:
  - interface_policy_group: 25G_CDP_LLDP_AccessPort
    lag_type: leaf
    fibre_channel_interface_policy: FCOE_F_TrunkOff_FCPolicy
    priority_flow_control_policy: PFC_Auto

BridgeDomains_Subnets:
- { Tenant_name: common, VRF_name: EDGE_CORE_VRF, BD_name: Storage_FC_FCoE_BD, bd_type: fc, enable_routing: no }  
- { Tenant_name: common, VRF_name: EDGE_CORE_VRF, BD_name: Storage_Native_Vlan_BD, enable_routing: yes } 

AppProfiles_EPGs_Domains_Static_Bindings:
- { Tenant_name: common, AppProfile_name: Storage_FC_FCoE, EPG_name: Storage_FC_FCoE_EPG,     BD_name: Storage_FC_FCoE_BD, storage_domain_name: SAN_FibreChannelDomain, Storage_FC_FCoE_Static_Binding: "{{ port_profile_storage }}"}
- { Tenant_name: common, AppProfile_name: Storage_FC_FCoE, EPG_name: Storage_Native_Vlan_EPG, BD_name: Storage_Native_Vlan_BD, domain_name: FCoE_FIP_Vlan_PhysDom, domain_type: phys, Encap_VLAN: 1, Static_Binding: "{{ port_profile_native_vlan }}" }

