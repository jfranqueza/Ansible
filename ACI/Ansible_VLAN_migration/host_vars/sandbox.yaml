          - { vlan_range_start: 89, vlan_range_end: 89, description: 'Network legacy PRE vlan' }

      - domain_type: phys
        domain_name: UNGSC_INFRA_PhysDom_lab
        vlan_pools:
        - vlan_pool_name: UNGSC_INFRA_StaticVLPool_lab
          vlan_pool_allocation_mode: static
