###################################
# roles                           #
# - Interface_Policy_Groups       #
###################################

Interface_Policy_Group_task_config:
  - interface_policy_group: 25G_CDP_LLDP_AccessPort
    lag_type: leaf
    AAEP: DCnetworks_AAEP
    link_level_policy: 25GigAuto
    cdp_policy: CDP_On
    lldp_policy: LLDP_On



###################################
# roles:                          #
# - AAEPs                         #
# - Domains                       #
# - VLAN_Pools                    #
###################################

# AAEPs, Domains and VLAN Pools
AAEP_task_config:
  - name: EDGE_CORE_AAEP
    domains:
      - domain_type: l3dom
        domain_name: EDGE_CORE_L3Dom_lab_lab
        vlan_pools:
        - vlan_pool_name: EDGE_CORE_StaticVLPool_lab
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 755, vlan_range_end: 758, description: 'Tenant PrivateCloud_NSX L3Out Core_BDS_L3Out' }

  - name: DCnetworks_AAEP
    domains:
      - domain_type: phys
        domain_name: DCnetworks_PhysDom_lab
        vlan_pools:
        - vlan_pool_name: DCnetworks_StaticVLPool_lab
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 1001, vlan_range_end: 1004, description: 'NSX-T underlay vlans for Management Domain' }
          - { vlan_range_start: 1021, vlan_range_end: 1024, description: 'NSX-T underlay vlans for Production Domain' }
          - { vlan_range_start: 1031, vlan_range_end: 1034, description: 'NSX-T underlay vlans for PreProduction Domain' }

      - domain_type: l3dom
        domain_name: DCnetworks_L3Dom_lab
        vlan_pools:
        - vlan_pool_name: DCnetworks_StaticVLPool_lab
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 1501, vlan_range_end: 1502, description: 'NSX-T Management Domain. L3Out to T0 Routers' }
          - { vlan_range_start: 1511, vlan_range_end: 1512, description: 'NSX-T Production Domain. L3Out to T0 Routers' }
          - { vlan_range_start: 1531, vlan_range_end: 1532, description: 'NSX-T PreProduction Domain. L3Out to T0 Routers' }

      - domain_type: phys
        domain_name: UNGSC_PRE_PhysDom
        vlan_pools:
        - vlan_pool_name: UNGSC_PRE_StaticVLPool_lab
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 15, vlan_range_end: 15, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 20, vlan_range_end: 20, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 228, vlan_range_end: 228, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 2801, vlan_range_end: 2801, description: 'Network legacy PRE vlan' }                              
          - { vlan_range_start: 289, vlan_range_end: 289, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 35, vlan_range_end: 35, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 30, vlan_range_end: 30, description: 'Network legacy PRE vlan' }
          - { vlan_range_start: 366, vlan_range_end: 366, description: 'Network legacy PRE vlan' }
