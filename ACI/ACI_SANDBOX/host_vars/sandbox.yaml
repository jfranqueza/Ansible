###################################
# roles                           #
# - Interface_Policy_Groups       #
###################################

Interface_Policy_Group_task_config:
  - interface_policy_group: 25G_CDP_LLDP_AccessPort
    lag_type: leaf
    AAEP: DCnetworks_AAEP
    link_level_policy: 25GigAuto
    cdp_policy: CDP_On
    lldp_policy: LLDP_On

###################################
# roles:                          #
# - AAEPs                         #
# - Domains                       #
# - VLAN_Pools                    #
###################################

# AAEPs, Domains and VLAN Pools
AAEP_task_config:
  - name: EDGE_CORE_AAEP
    domains:
      - domain_type: l3dom
        domain_name: EDGE_CORE_L3Dom
        vlan_pools:
        - vlan_pool_name: EDGE_CORE_StaticVLPool
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 755, vlan_range_end: 758, description: 'Tenant PrivateCloud_NSX L3Out Core_VLC_L3Out' }

  - name: DCnetworks_AAEP
    domains:
      - domain_type: phys
        domain_name: DCnetworks_PhysDom
        vlan_pools:
        - vlan_pool_name: DCnetworks_StaticVLPool
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 1001, vlan_range_end: 1004, description: 'NSX-T underlay vlans for Management Domain' }
          - { vlan_range_start: 1021, vlan_range_end: 1024, description: 'NSX-T underlay vlans for Production Domain' }
          - { vlan_range_start: 1031, vlan_range_end: 1034, description: 'NSX-T underlay vlans for PreProduction Domain' }

      ##### VLAN POOL FOR DEV ###
        - vlan_pool_name: UNGSC_DEV_StaticVLPool
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 310, vlan_range_end: 310, description: 'Network legacy DEV vlan' }
          - { vlan_range_start: 731, vlan_range_end: 733, description: 'Network legacy DEV vlan' }
          - { vlan_range_start: 735, vlan_range_end: 735, description: 'Network legacy DEV vlan' }
          - { vlan_range_start: 737, vlan_range_end: 737, description: 'Network legacy DEV vlan' }
          - { vlan_range_start: 173, vlan_range_end: 173, description: 'Network legacy DEV vlan' }                              
          - { vlan_range_start: 744, vlan_range_end: 745, description: 'Network legacy DEV vlan' }
          - { vlan_range_start: 745, vlan_range_end: 745, description: 'Network legacy DEV vlan' }

      - domain_type: l3dom
        domain_name: DCnetworks_L3Dom
        vlan_pools:
        - vlan_pool_name: DCnetworks_StaticVLPool
          vlan_pool_allocation_mode: static
          vlans:
          - { vlan_range_start: 1501, vlan_range_end: 1502, description: 'NSX-T Management Domain. L3Out to T0 Routers' }
          - { vlan_range_start: 1511, vlan_range_end: 1512, description: 'NSX-T Production Domain. L3Out to T0 Routers' }
          - { vlan_range_start: 1531, vlan_range_end: 1532, description: 'NSX-T PreProduction Domain. L3Out to T0 Routers' }


