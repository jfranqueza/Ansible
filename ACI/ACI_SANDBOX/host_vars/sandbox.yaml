# - Interface_Selectors           #
# - Switch_and_Interface_Profiles #
# - enable_or_disable_ports       #
###################################

Switch_name_suffix: '_SwProf'
Interface_name_suffix: '_IntProf'
include_node_id_in_switch_profile_name: 'no'

Switches_and_Interfaces_map:
  - switch_name: leaf-101
    pod: 1
    switch_node_id: 101
    ports_list:
    - { port: 1,  port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 2,  port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 4,  port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 21, port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 22, port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 23, port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 24, port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    ###### CONFIGURATION FOR THE NETWORK CENTRIC MIGRATION DEV #####
    - { port: 26,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-6-p0_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 28,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-5-p0_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 30,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-4-p0_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 32,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-3.p0_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }

  - switch_name: leaf-102
    pod: 1      
    switch_node_id: 102
    ports_list:
    - { port: 1,  port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 2,  port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 4,  port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 21, port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 22, port_state: enabled, port_description: NSX-T_Management,          interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 23, port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 24, port_state: enabled, port_description: NSX-T_Workload_Production, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    ###### CONFIGURATION FOR THE NETWORK CENTRIC MIGRATION DEV #####
    - { port: 26,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-6-p7_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 28,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-5-p7_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
    - { port: 30,  port_state: enabled, port_description: PRE-VLCVI-P-ILOC-4-p5_1, interface_type: switch_port, interface_policy_group: 25G_CDP_LLDP_AccessPort }
